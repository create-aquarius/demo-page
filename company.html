<!DOCTYPE html>
<html lang="ja" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>運営会社 | 〇〇サロン</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>body{font-family:'Noto Sans JP',sans-serif;}</style>
</head>
<body class="bg-slate-50 text-slate-700">
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-4xl mx-auto px-4 py-6 flex justify-between items-center">
      <h1 class="text-xl md:text-2xl font-black text-sky-600">運営会社</h1>
      <a href="./index.html" class="text-sm md:text-base text-sky-600 hover:text-sky-700 font-bold">トップへ戻る</a>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-10">
    <section class="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8">
      <h2 class="text-lg md:text-xl font-bold mb-6">会社概要</h2>
      <dl class="space-y-4 text-sm md:text-base">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-2 md:gap-4">
          <dt class="font-bold text-slate-500">会社名</dt>
          <dd class="md:col-span-3">株式会社〇〇ビューティー</dd>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-2 md:gap-4">
          <dt class="font-bold text-slate-500">代表者</dt>
          <dd class="md:col-span-3">代表取締役 〇〇 〇〇</dd>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-2 md:gap-4">
          <dt class="font-bold text-slate-500">所在地</dt>
          <dd class="md:col-span-3">〒100-0005 東京都千代田区丸の内X-X ルミナビル 4F</dd>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-2 md:gap-4">
          <dt class="font-bold text-slate-500">設立</dt>
          <dd class="md:col-span-3">2024年4月</dd>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-2 md:gap-4">
          <dt class="font-bold text-slate-500">事業内容</dt>
          <dd class="md:col-span-3">脱毛サロン運営、美容関連サービスの企画・提供</dd>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-2 md:gap-4">
          <dt class="font-bold text-slate-500">お問い合わせ</dt>
          <dd class="md:col-span-3">03-XXXX-XXXX（11:00〜21:00）</dd>
        </div>
      </dl>
    </section>
  </main>
</body>
</html>
